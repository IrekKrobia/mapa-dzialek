<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wydzielanie działki - Satelita & OSM</title>
    
    <link rel="stylesheet" href="https://cloudflare.com" />
    <link rel="stylesheet" href="https://cloudflare.com" />
    
    <style>
        html, body, #map { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: Arial, sans-serif; }
        #info-box { position: absolute; top: 20px; left: 70px; z-index: 1000; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); max-width: 280px; }
        h3 { margin-top: 0; margin-bottom: 8px; font-size: 16px; }
        p { margin: 0 0 10px 0; font-size: 13px; color: #555; }
        #area-result { font-size: 14px; color: #000; font-weight: bold; }
    </style>
</head>
<body>

    <div id="info-box">
        <h3>Twoja Działka</h3>
        <p>Użyj narzędzia wielokąta po lewej stronie, aby obrysować obszar. W prawym górnym rogu możesz włączyć zdjęcia satelitarne.</p>
        <div id="area-result">Powierzchnia: -</div>
    </div>

    <div id="map"></div>

    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>

    <script>
        var osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OSM' });
        var satelliteLayer = L.tileLayer('https://arcgisonline.com{z}/{y}/{x}', { maxZoom: 19, attribution: 'Tiles © Esri' });

        var map = L.map('map', { center: [52.0689, 19.4797], zoom: 6, layers: [osmLayer] });
        L.control.layers({"Zwykła mapa": osmLayer, "Satelita": satelliteLayer}, null, { position: 'topright' }).addTo(map);

        var drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);

        var drawControl = new L.Control.Draw({
            edit: { featureGroup: drawnItems },
            draw: {
                polygon: { allowIntersection: false, shapeOptions: { color: '#ff3333', weight: 3, fillOpacity: 0.2 } },
                rectangle: { shapeOptions: { color: '#ff3333', weight: 3, fillOpacity: 0.2 } },
                polyline: false, circle: false, marker: false, circlemarker: false
            }
        });
        map.addControl(drawControl);

        map.on(L.Draw.Event.CREATED, function (e) {
            var layer = e.layer;
            drawnItems.clearLayers().addLayer(layer);
            var area = turf.area(layer.toGeoJSON());
            var text = area >= 10000 ? (area / 10000).toFixed(2) + " ha" : area.toFixed(2) + " m²";
            document.getElementById('area-result').innerHTML = "Powierzchnia: " + text;
        });
    </script>
</body>
</html>
