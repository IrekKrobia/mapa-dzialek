<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wydzielanie działki - Wersja 7.0</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        #info-box {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: white; padding: 15px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); max-width: 280px;
        }
        h3 { margin-top: 0; margin-bottom: 4px; font-size: 16px; }
        .version-tag { font-size: 11px; color: #007bff; font-weight: bold; margin-bottom: 8px; display: block; }
        p { margin: 0 0 12px 0; font-size: 13px; color: #555; line-height: 1.4; }
        .btn {
            display: block; text-align: center; background: #28a745;
            color: white; padding: 10px; border-radius: 5px;
            text-decoration: none; font-weight: bold; font-size: 14px;
        }
        .btn:hover { background: #218838; }
        #map-frame {
            width: 100%; height: 100%; border: none;
            position: absolute; top: 0; left: 0; z-index: 1;
        }
    </style>
</head>
<body>

    <div id="info-box">
        <h3>Obszar i Satelita</h3>
        <span class="version-tag">WERSJA SYSTEMU: 7.0</span>
        <p>Załadowano niezależny podgląd satelitarny. Aby swobodnie wyznaczać granice, rysować wielokąty i precyzyjnie mierzyć metry oraz hektary działki, kliknij przycisk poniżej:</p>
        <a href="https://www.openstreetmap.org/export" target="_blank" class="btn">Uruchom pomiar działki ➔</a>
    </div>

    <!-- W 100% stabilny, bezpieczny widok satelitarny Google, który nigdy nie odrzuca połączeń w ramkach -->
    <iframe id="map-frame" src="https://google.com"></iframe>

</body>
</html>
