<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wydzielanie działki - OpenStreetMap</title>
    
    <!-- Tylko jedna, podstawowa i stabilna biblioteka stylów -->
    <link rel="stylesheet" href="https://cloudflare.com" />
    
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: Arial, sans-serif;
        }
        #map {
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0; z-index: 1;
        }
        #info-box {
            position: absolute; top: 20px; left: 70px; z-index: 1000;
            background: white; padding: 15px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); max-width: 280px;
        }
        h3 { margin-top: 0; margin-bottom: 8px; font-size: 16px; }
        p { margin: 0 0 10px 0; font-size: 13px; color: #555; }
        #area-result { font-size: 14px; color: #000; font-weight: bold; }
        .btn-reset { display: block; margin-top: 10px; padding: 5px 10px; background: #ff3333; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="info-box">
        <h3>Pomiar Działki</h3>
        <p>Klikaj bezpośrednio na mapie, aby stawiać punkty graniczne. Po dodaniu minimum 3 punktów program automatycznie zamknie wielokąt i obliczy pole powierzchni.</p>
        <div id="area-result">Powierzchnia: -</div>
        <button class="btn-reset" onclick="resetMap()">Wyczyść punkty</button>
    </div>

    <div id="map"></div>

    <!-- Załadowanie wyłącznie podstawy Leaflet oraz kalkulatora powierzchni Turf -->
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>

    <script>
        var osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19, attribution: '© OpenStreetMap'
        });

        var satelliteLayer = L.tileLayer('https://arcgisonline.com{z}/{y}/{x}', {
            maxZoom: 19, attribution: 'Tiles © Esri'
        });

        var map = L.map('map', {
            center: [52.0689, 19.4797],
            zoom: 6,
            layers: [osmLayer]
        });

        var baseMaps = {
            "Zwykła mapa (ulice)": osmLayer,
            "Zdjęcia satelitarne": satelliteLayer
        };
        L.control.layers(baseMaps, null, { position: 'topright' }).addTo(map);

        // Tablice i zmienne pomocnicze na punkty, linie i obszar działki
        var clickedPoints = [];
        var visualMarkers = [];
        var activePolygon = null;

        // Obsługa kliknięcia bezpośrednio na mapie
        map.on('click', function (e) {
            var lat = e.latlng.lat;
            var lng = e.latlng.lng;

            // Zapisujemy współrzędne punktu
            clickedPoints.push([lat, lng]);

            // Dodajemy mały znacznik punktu na mapie
            var marker = L.circleMarker([lat, lng], { radius: 5, color: '#007bff', fillColor: '#007bff', fillOpacity: 1 }).addTo(map);
            visualMarkers.push(marker);

            // Jeśli mamy więcej niż 2 punkty, zaczynamy rysować obszar i liczyć metry
            if (clickedPoints.length >= 3) {
                if (activePolygon) {
                    map.removeLayer(activePolygon);
                }

                // Tworzymy wielokąt z zaznaczonych punktów
                activePolygon = L.polygon(clickedPoints, { color: '#ff3333', weight: 3, fillOpacity: 0.3 }).addTo(map);

                // Konwersja do GeoJSON i wyliczenie powierzchni za pomocą Turf.js
                var geojson = activePolygon.toGeoJSON();
                var areaSquareMeters = turf.area(geojson);

                var resultText = "";
                if (areaSquareMeters >= 10000) {
                    resultText = (areaSquareMeters / 10000).toFixed(2) + " ha";
                } else {
                    resultText = areaSquareMeters.toFixed(2) + " m²";
                }
                document.getElementById('area-result').innerHTML = "Powierzchnia: " + resultText;
            }
        });

        // Funkcja resetująca zaznaczenie
        function resetMap() {
            clickedPoints = [];
            if (activePolygon) {
                map.removeLayer(activePolygon);
                activePolygon = null;
            }
            visualMarkers.forEach(function(m) {
                map.removeLayer(m);
            });
            visualMarkers = [];
            document.getElementById('area-result').innerHTML = "Powierzchnia: -";
        }
    </script>
</body>
</html>
