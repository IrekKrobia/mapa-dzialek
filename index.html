<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wydzielanie działki - OpenStreetMap</title>
    
    <!-- Style CSS -->
    <link rel="stylesheet" href="https://cloudflare.com" />
    <link rel="stylesheet" href="https://cloudflare.com" />
    
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: Arial, sans-serif;
        }
        #map {
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0; z-index: 1;
        }
        #info-box {
            position: absolute; top: 20px; left: 70px; z-index: 1000;
            background: white; padding: 15px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); max-width: 280px;
        }
        h3 { margin-top: 0; margin-bottom: 8px; font-size: 16px; }
        p { margin: 0 0 10px 0; font-size: 13px; color: #555; }
        #area-result { font-size: 14px; color: #000; font-weight: bold; }
    </style>
</head>
<body>

    <div id="info-box">
        <h3>Twoja Działka</h3>
        <p>Wybierz ikonę wielokąta po lewej stronie, aby obrysować obszar. W prawym górnym rogu możesz włączyć zdjęcia satelitarne.</p>
        <div id="area-result">Powierzchnia: -</div>
    </div>

    <div id="map"></div>

    <!-- Biblioteki JavaScript (Wszystkie 3 wymagane, we właściwej kolejności) -->
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>

    <script>
        // Warstwy mapy
        var osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19, attribution: '© OpenStreetMap'
        });

        var satelliteLayer = L.tileLayer('https://arcgisonline.com{z}/{y}/{x}', {
            maxZoom: 19, attribution: 'Tiles © Esri'
        });

        // Inicjalizacja mapy
        var map = L.map('map', {
            center: [52.0689, 19.4797],
            zoom: 6,
            layers: [osmLayer]
        });

        var baseMaps = {
            "Zwykła mapa (ulice)": osmLayer,
            "Zdjęcia satelitarne": satelliteLayer
        };
        L.control.layers(baseMaps, null, { position: 'topright' }).addTo(map);

        var drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);

        var drawControl = new L.Control.Draw({
            edit: { featureGroup: drawnItems },
            draw: {
                polygon: { allowIntersection: false, shapeOptions: { color: '#ff3333', weight: 3, fillOpacity: 0.2 } },
                rectangle: { shapeOptions: { color: '#ff3333', weight: 3, fillOpacity: 0.2 } },
                polyline: false, circle: false, marker: false, circlemarker: false
            }
        });
        map.addControl(drawControl);

        // Obliczanie powierzchni
        map.on(L.Draw.Event.CREATED, function (e) {
            var layer = e.layer;
            drawnItems.clearLayers();
            drawnItems.addLayer(layer);

            var geojson = layer.toGeoJSON();
            var areaSquareMeters = turf.area(geojson);
            
            var resultText = areaSquareMeters >= 10000 ? (areaSquareMeters / 10000).toFixed(2) + " ha" : areaSquareMeters.toFixed(2) + " m²";
            document.getElementById('area-result').innerHTML = "Powierzchnia: " + resultText;
        });
    </script>
</body>
</html>
