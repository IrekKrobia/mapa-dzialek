<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wydzielanie działki - Wersja 11.0</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: Arial, sans-serif;
            background-color: #222;
        }
        #container {
            position: relative; width: 100%; height: 100%;
        }
        #map-image {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0; z-index: 1;
        }
        #draw-canvas {
            position: absolute; top: 0; left: 0; z-index: 5;
            cursor: crosshair;
        }
        #info-box {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: white; padding: 15px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); max-width: 280px;
        }
        h3 { margin-top: 0; margin-bottom: 4px; font-size: 16px; color: #000; }
        .version-tag { font-size: 11px; color: #d35400; font-weight: bold; margin-bottom: 8px; display: block; }
        p { margin: 0 0 12px 0; font-size: 13px; color: #333; line-height: 1.4; }
        #area-result { font-size: 14px; color: #000; font-weight: bold; margin-bottom: 10px; }
        .btn-layer { display: block; width: 100%; padding: 8px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 5px; }
        .btn-reset { display: block; width: 100%; padding: 8px; background: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="container">
        <!-- Zwykły znacznik obrazu pobierający mapę z bezpiecznych, publicznych serwerów jako plik JPG -->
        <img id="map-image" src="https://arcgisonline.com" alt="Mapa">
        
        <!-- Powłoka graficzna do rysowania linii bezpośrednio w przeglądarce -->
        <canvas id="draw-canvas"></canvas>
    </div>

    <div id="info-box">
        <h3>Pomiar Terenu</h3>
        <span class="version-tag">WERSJA SYSTEMU: 11.0</span>
        <p>Klikaj bezpośrednio na mapie, aby stawiać punkty graniczne. Po dodaniu min. 3 punktów system obrysuje działkę i wyliczy jej powierzchnię.</p>
        <div id="area-result">Powierzchnia: -</div>
        <button class="btn-layer" onclick="toggleMapType()">Przełącz Satelita / Drogi</button>
        <button class="btn-reset" onclick="resetPoints()">Wyczyść punkty</button>
    </div>

    <script>
        var img = document.getElementById('map-image');
        var canvas = document.getElementById('draw-canvas');
        var ctx = canvas.getContext('2d');
        var points = [];
        var isSatellite = true;

        // Przełączanie między zdjęciem satelitarnym a siatką dróg bez używania skryptów CDN
        function toggleMapType() {
            isSatellite = !isSatellite;
            if (isSatellite) {
                img.src = 'https://arcgisonline.com';
            } else {
                img.src = 'https://openstreetmap.org';
            }
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            redraw();
        }

        img.onload = function() {
            resizeCanvas();
        };
        window.addEventListener('resize', resizeCanvas);

        canvas.addEventListener('click', function(e) {
            var rect = canvas.getBoundingClientRect();
            var x = e.clientX - rect.left;
            var y = e.clientY - rect.top;

            points.push({x: x, y: y});

            // Wbudowany, lokalny matematyczny algorytm liczenia pola powierzchni wielokąta z pikseli
            if (points.length >= 3) {
                var area = 0;
                var j = points.length - 1;
                for (var i = 0; i < points.length; i++) {
                    area += (points[j].x + points[i].x) * (points[j].y - points[i].y);
                    j = i;
                }
                var calculatedArea = Math.abs(area / 2) * 15.6; // Przelicznik skali graficznej dla wybranego kafelka

                var resultText = calculatedArea >= 10000 ? (calculatedArea / 10000).toFixed(2) + " ha" : calculatedArea.toFixed(2) + " m²";
                document.getElementById('area-result').innerHTML = "Powierzchnia: " + resultText;
            }
            redraw();
        });

        function redraw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (points.length > 0) {
                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);
                for (var i = 1; i < points.length; i++) {
                    ctx.lineTo(points[i].x, points[i].y);
                }
                if (points.length >= 3) {
                    ctx.closePath();
                    ctx.fillStyle = 'rgba(255, 51, 51, 0.3)';
                    ctx.fill();
                }
                ctx.strokeStyle = '#ff3333';
                ctx.lineWidth = 3;
                ctx.stroke();

                // Rysowanie kropek węzłowych działki
                points.forEach(function(pt) {
                    ctx.beginPath();
                    ctx.arc(pt.x, pt.y, 6, 0, 2 * Math.PI);
                    ctx.fillStyle = '#007bff';
                    ctx.fill();
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                });
            }
        }

        function resetPoints() {
            points = [];
            document.getElementById('area-result').innerHTML = "Powierzchnia: -";
            redraw();
        }
    </script>
</body>
</html>
