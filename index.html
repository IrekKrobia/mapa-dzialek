<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wydzielanie działki - Wersja 8.0</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: Arial, sans-serif;
            background-color: #111;
        }
        #map-canvas {
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0; z-index: 1;
            cursor: crosshair;
        }
        #info-box {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: white; padding: 15px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); max-width: 280px;
        }
        h3 { margin-top: 0; margin-bottom: 4px; font-size: 16px; color: #000; }
        .version-tag { font-size: 11px; color: #e67e22; font-weight: bold; margin-bottom: 8px; display: block; }
        p { margin: 0 0 12px 0; font-size: 13px; color: #333; line-height: 1.4; }
        #area-result { font-size: 14px; color: #000; font-weight: bold; margin-bottom: 10px; }
        .btn { padding: 6px 12px; background: #d9534f; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="info-box">
        <h3>Pomiar Terenu</h3>
        <span class="version-tag">WERSJA SYSTEMU: 8.0</span>
        <p>Klikaj bezpośrednio na ekranie satelitarnym, aby obrysować swoją działkę. System sam wyznaczy obszar i policzy powierzchnię.</p>
        <div id="area-result">Powierzchnia: -</div>
        <button class="btn" onclick="clearPoints()">Resetuj punkty</button>
    </div>

    <!-- Czysty kontener rysunkowy HTML5 - całkowity brak zablokowanych ramek iframe -->
    <canvas id="map-canvas"></canvas>

    <script>
        var canvas = document.getElementById('map-canvas');
        var ctx = canvas.getContext('2d');
        var points = [];

        // Pobieranie darmowego zdjęcia satelitarnego bezpośrednio jako tło graficzne (Bypass CORS/nosniff)
        var bgImage = new Image();
        bgImage.crossOrigin = "anonymous";
        // Używamy darmowego, stabilnego kafelka satelitarnego o stałych wymiarach z serwera NASA/Esri
        bgImage.src = 'https://arcgisonline.com';

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawEverything();
        }

        bgImage.onload = function() {
            resizeCanvas();
        };
        window.addEventListener('resize', resizeCanvas);

        function drawEverything() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Rysowanie tła satelitarnego rozciągniętego na cały ekran
            if (bgImage.complete) {
                ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
            }

            // Rysowanie linii działki
            if (points.length > 0) {
                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);
                for (var i = 1; i < points.length; i++) {
                    ctx.lineTo(points[i].x, points[i].y);
                }
                if (points.length >= 3) {
                    ctx.closePath();
                    ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
                    ctx.fill();
                }
                ctx.strokeStyle = '#ff3333';
                ctx.lineWidth = 3;
                ctx.stroke();

                // Rysowanie punktów granicznych
                points.forEach(function(pt) {
                    ctx.beginPath();
                    ctx.arc(pt.x, pt.y, 6, 0, 2 * Math.PI);
                    ctx.fillStyle = '#007bff';
                    ctx.fill();
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                });
            }
        }

        canvas.addEventListener('click', function(e) {
            var rect = canvas.getBoundingClientRect();
            var x = e.clientX - rect.left;
            var y = e.clientY - rect.top;

            points.push({x: x, y: y});
            
            // Liczenie powierzchni na podstawie pikseli (uproszczony przelicznik skali)
            if (points.length >= 3) {
                var area = 0;
                var j = points.length - 1;
                for (var i = 0; i < points.length; i++) {
                    area += (points[j].x + points[i].x) * (points[j].y - points[i].y);
                    j = i;
                }
                var finalArea = Math.abs(area / 2);
                // Przeliczenie umowne pikseli na metry kwadratowe dla skali mapy
                var realArea = finalArea * 12.5; 
                
                var resultText = realArea >= 10000 ? (realArea / 10000).toFixed(2) + " ha" : realArea.toFixed(2) + " m²";
                document.getElementById('area-result').innerHTML = "Powierzchnia: " + resultText;
            }
            
            drawEverything();
        });

        function clearPoints() {
            points = [];
            document.getElementById('area-result').innerHTML = "Powierzchnia: -";
            drawEverything();
        }
    </script>
</body>
</html>
